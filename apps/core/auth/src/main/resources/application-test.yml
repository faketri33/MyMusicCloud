spring:
  profile:
    test
  application:
    name: auth
  main:
    banner-mode: off
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

jwts:
  keys:
    private: classpath:keys/test_pr_key.pem
    public: classpath:keys/test_pb_key.pem
    public.lifetime: 3600
    private.lifetime: 86400

cors:
  allowedOrigins: "http://localhost:8000"